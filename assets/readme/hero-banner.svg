<svg width="1400" height="470" viewBox="0 0 1400 470" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="470"><stop stop-color="#071226"/><stop offset="0.55" stop-color="#0B2342"/><stop offset="1" stop-color="#06445D"/></linearGradient>
  <linearGradient id="line" x1="52" y1="30" x2="1348" y2="435"><stop stop-color="#21C7FF"/><stop offset=".55" stop-color="#21C7FF" stop-opacity=".35"/><stop offset="1" stop-color="#28D8BC"/></linearGradient>
  <linearGradient id="accent" x1="70" y1="0" x2="580" y2="0"><stop stop-color="#22C8FF"/><stop offset="1" stop-color="#26D9BA"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    .eyebrow{font:700 14px 'Segoe UI',Arial,sans-serif;fill:#9AB2D2;letter-spacing:2px}
    .title{font:700 54px 'Segoe UI',Arial,sans-serif;fill:#F7FAFF}
    .sub{font:400 19px 'Segoe UI',Arial,sans-serif;fill:#CBD7EA}
    .chip{font:600 14px 'Segoe UI',Arial,sans-serif;fill:#E8F7FF}
    .metric{font:700 31px 'Segoe UI',Arial,sans-serif;fill:#F8FBFF}
    .label{font:700 11px 'Segoe UI',Arial,sans-serif;fill:#92A9C8;letter-spacing:1.2px}
    .route{stroke-dasharray:10 14;animation:route 3.6s linear infinite}
    .pulse1{animation:pulse 2.8s ease-in-out infinite}
    .pulse2{animation:pulse 2.8s ease-in-out .75s infinite}
    .pulse3{animation:pulse 2.8s ease-in-out 1.45s infinite}
    @keyframes pulse{0%,100%{opacity:.35;transform:scale(1);transform-origin:center}50%{opacity:1;transform:scale(1.28);transform-origin:center}}
    @keyframes route{from{stroke-dashoffset:60}to{stroke-dashoffset:0}}
  </style>
</defs>
